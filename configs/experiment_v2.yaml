daq:
  enabled: true
  opto_mode: "dio"  # "dio" (default rig wiring) or "counter"

channels:
  digital_outputs:
    puff: "Dev1/port0/line5"
    shock: "Dev1/port0/line7"
    opto: "Dev1/port1/line0"
  digital_inputs: {}
  analog_outputs:
    reward_valve: "Dev1/ao1"
  analog_inputs:
    lick: "Dev1/ai2"
  counter_outputs:
    # Optional section for future pulse-train outputs.
    laser_clock: "Dev1/ctr0"

stimuli:
  audio:
    enabled: true
    device: null
    samplerate_hz: 48000
    cue_duration_sec: 0.5
    sound_a_frequency_hz: 8000
    sound_b_frequency_hz: 12000
  visual:
    use_psychopy: true
    screen_index: 1
    # Mirror the same VR stimulus on the three VR displays.
    screen_indices: [1, 2, 3]
    fullscreen: true
    width: 1920
    height: 1080
    duration_sec: 0.2
  whisker:
    output_name: "puff"
    duration_sec: 0.05
  shock:
    output_name: "shock"
    duration_sec: 0.2
    amplitude_mA: 0.0
  opto:
    output_name: "opto"
    duration_sec: 1.0
    frequency_hz: 20.0
    pulse_width_sec: 0.015
    power_mw: 0.0
  reward_valve:
    output_name: "reward_valve"
    duration_ms: 50

phases:
  decoder:
    conditions:
      - "screen_a"
      - "screen_b"
      - "sound_a"
      - "sound_b"
      - "whisker_a"
      - "whisker_b"
      - "no_stim"
    reps_per_condition: 60
    event_duration_sec: [2.0, 10.0]
    iti_sec: [2.0, 10.0]
    randomize_trial_order: true
    anti_streak_randomization: true
    trial_table:
      - cue_frequency_hz: 8000
        cue_duration_sec: 0.5
  pre-conditioning:
    blocks_per_condition: 4
    randomize_trial_order: true
    block_table:
      - condition: "target"
        duration_sec: 30.0
      - condition: "non_target"
        duration_sec: 60.0
      - condition: "empty"
        duration_sec: 45.0
      - condition: "opto_sham"
        duration_sec: 60.0
  fear conditioning:
    randomize_trial_order: false
    target_scene_duration_min: [6.0, 8.0]
    shocks_per_session: [3, 5]
    shock_spacing_sec: [30.0, 60.0]
    shock_enabled: true
    shock_channel: "shock"
  post-conditioning:
    blocks_per_condition: 4
    randomize_trial_order: true
    block_table:
      - condition: "target"
        duration_sec: 60.0
      - condition: "non_target"
        duration_sec: 60.0
      - condition: "empty"
        duration_sec: 45.0
      - condition: "active_opto"
        duration_sec: 60.0
  fMRI opto block design:
    total_duration_sec: 3600
    on_duration_sec: 30.0
    off_duration_sec: 30.0
    repeat_until_total_duration: true
    randomize_trial_order: false
    opto_channel: "opto"
    opto_duration_sec: 30.0

randomization:
  seed: null
  strategy: "uniform"
  dropout:
    enabled: true
    interval_sec: 10.0
    dropped_modalities:
      - "screen"
      - "sound"
      - "whisker"
    dropout_duration_sec: [2.0, 4.0]
    allow_multiple_simultaneous_drops: false

logging:
  output_root: "./data"

session:
  name: "vr_engrams_v2"
  lick_input_name: "lick"
  reward_output_name: "reward_valve"
  reward_on_lick: false
  lick_poll_interval_sec: 0.005
  lick_threshold: 2.5
  lick_logic_mode: "high_is_lick"
  lick_refractory_sec: 0.05
